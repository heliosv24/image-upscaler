<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a84ff"/>
      <stop offset="100%" style="stop-color:#0066d6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <g transform="translate(256,256)">
    <!-- Upward arrow representing upscaling -->
    <path d="M0-120 L70-30 L30-30 L30 100 L-30 100 L-30-30 L-70-30 Z" fill="white" opacity="0.95"/>
    <!-- Small pixels at bottom representing low-res input -->
    <rect x="-90" y="120" width="36" height="36" rx="4" fill="white" opacity="0.35"/>
    <rect x="-42" y="120" width="36" height="36" rx="4" fill="white" opacity="0.45"/>
    <rect x="6" y="120" width="36" height="36" rx="4" fill="white" opacity="0.55"/>
    <rect x="54" y="120" width="36" height="36" rx="4" fill="white" opacity="0.35"/>
  </g>
</svg>
